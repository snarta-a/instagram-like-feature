<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Cards</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <div class="card">
            <img src="https://images.unsplash.com/photo-1500648767791-00dcc994a43e?w=500" alt="Salmon">
            <h1>Salmon</h1>
            <h3>65</h3>
            <h2>Maried : false</h2>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1506794778202-cad84cf45f1d?w=500" alt="Shahrukh">
            <h1>Shahrukh</h1>
            <h3>60</h3>
            <h2>Maried : true</h2>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1504593811423-6dd665756598?w=500" alt="Sarthak">
            <h1>Sarthak</h1>
            <h3>40</h3>
            <h2>Maried : false</h2>
        </div>

    </div>

</body>
</html>
