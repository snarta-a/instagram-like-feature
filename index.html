<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Friend Request Cards</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <div class="card">

            <img src="https://images.unsplash.com/photo-1500648767791-00dcc994a43e?w=500" alt="">

            <h1>Salmon</h1>

            <p class="profession">Web Developer</p>

            <h3>Age : 65</h3>

            <h2 class="status">Stranger</h2>

            <button class="add-btn">
                Add Friend
            </button>

        </div>

        <div class="card">

            <img src="https://images.unsplash.com/photo-1506794778202-cad84cf45f1d?w=500" alt="">

            <h1>Shahrukh</h1>

            <p class="profession">UI/UX Designer</p>

            <h3>Age : 60</h3>

            <h2 class="status">Stranger</h2>

            <button class="add-btn">
                Add Friend
            </button>

        </div>

        <div class="card">

            <img src="https://images.unsplash.com/photo-1504593811423-6dd665756598?w=500" alt="">

            <h1>Sarthak</h1>

            <p class="profession">Software Engineer</p>

            <h3>Age : 40</h3>

            <h2 class="status">Stranger</h2>

            <button class="add-btn">
                Add Friend
            </button>

        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
